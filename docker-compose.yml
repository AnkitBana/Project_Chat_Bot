version: "3.9"

# Loads variables from .env file in the same directory automatically.
# Copy .env.example → .env and fill in your API keys before running.

services:
  # ── AI Agent Server ─────────────────────────────────────────────────────────
  agent:
    build: .
    env_file:
      - .env                          # explicit — works even without shell exports
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0   # override to point at the redis service
    volumes:
      - agent_data:/app/data
      - agent_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Redis (distributed cache) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  agent_data:
  agent_logs:
  redis_data:
